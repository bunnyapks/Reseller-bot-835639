<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BUNNY BOT - RESELLER PANEL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #bc13fe; 
        --primary-glow: rgba(188, 19, 254, 0.7);
        --secondary: #00f3ff; 
        --secondary-glow: rgba(0, 243, 255, 0.6);
        --bg-dark: #000000; 
        --panel-bg: rgba(15, 15, 25, 0.65);
        --text: #ffffff;
        --success: #05ffa1; 
        --danger: #ff2a6d; 
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body { 
        margin: 0; 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-dark); 
        color: var(--text); 
        min-height: 100vh; 
        overflow-x: hidden;
        font-size: 12px;
    }

    /* Animated Background Orbs */
    body::before, body::after {
        content: ''; position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1;
        opacity: 0.5; pointer-events: none;
    }
    body::before {
        width: 50vw; height: 50vw; background: var(--primary); top: -10%; left: -10%;
        animation: floatOrb 10s infinite alternate ease-in-out;
    }
    body::after {
        width: 50vw; height: 50vw; background: var(--secondary); bottom: -10%; right: -10%;
        animation: floatOrb 12s infinite alternate-reverse ease-in-out;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: 10px; }

    /* Animations */
    @keyframes floatOrb {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(15px, 20px) scale(1.05); }
    }
    @keyframes heartbeat {
        0%, 100% { transform: scale(1); box-shadow: 0 0 5px var(--primary-glow); }
        50% { transform: scale(1.02); box-shadow: 0 0 10px var(--primary-glow), 0 0 5px var(--secondary-glow); }
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes gentleFloat {
        0%, 100% { transform: translateY(0); box-shadow: 0 5px 15px var(--primary-glow); }
        50% { transform: translateY(-5px); box-shadow: 0 15px 25px var(--secondary-glow); }
    }

    /* =========================================
       UPGRADED PREMIUM DARK NEON LOGIN SCREEN 
       ========================================= */
    #loginOverlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(5, 5, 10, 0.7); backdrop-filter: blur(12px);
        display: flex; justify-content: center; align-items: center; z-index: 9999; 
    }
    
    .login-box { 
        background: rgba(15, 15, 25, 0.85);
        padding: 30px 25px; border-radius: 16px; text-align: center; 
        width: 85%; max-width: 320px; backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
        animation: slideIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        position: relative;
    }

    .login-box::before {
        content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: linear-gradient(45deg, var(--primary), transparent, var(--secondary));
        z-index: -1; border-radius: 18px; opacity: 0.5;
        animation: rotate 4s linear infinite;
    }

    .login-box h2 { 
        font-family: 'Orbitron'; color: #fff; letter-spacing: 1px; margin-bottom: 20px; font-size: 16px;
        font-weight: 900; text-shadow: 0 0 10px var(--primary-glow);
    }

    .login-box .icon-wrapper {
        display: inline-flex; justify-content: center; align-items: center;
        width: 55px; height: 55px; border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        margin-bottom: 15px;
        animation: gentleFloat 3s infinite ease-in-out;
    }
    .login-box .icon-wrapper i { color: #fff; font-size: 24px; }

    .login-box input { 
        width: 100%; padding: 12px; margin-bottom: 12px; height: 42px;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
        color: #fff; border-radius: 8px; font-size: 12px; outline:none;
        transition: all 0.3s ease; font-family: 'Inter', sans-serif;
    }
    .login-box input::placeholder { color: #777; }
    .login-box input:focus { 
        border-color: var(--secondary); background: rgba(255,255,255,0.08); 
        box-shadow: 0 0 12px rgba(0,243,255,0.2); 
    }

    .btn-login { 
        width: 100%; padding: 10px; height: 42px; margin-top: 5px;
        background: linear-gradient(45deg, var(--primary), var(--secondary));
        background-size: 200% auto;
        border: none; color: #fff; font-weight: 700; letter-spacing: 1px;
        border-radius: 8px; cursor: pointer; font-size: 12px; 
        transition: 0.4s ease; text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
        box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4);
    }
    .btn-login:hover { 
        background-position: right center; transform: translateY(-2px); 
        box-shadow: 0 8px 25px rgba(0, 243, 255, 0.5); 
    }

    /* BUY RESELLER SECTION */
    .promo-section {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }
    .promo-section p {
        font-size: 10px; color: #aaa; margin: 0 0 10px 0; font-weight: 400;
    }
    .btn-buy {
        display: flex; justify-content: center; align-items: center; gap: 6px;
        width: 100%; height: 36px;
        background: rgba(0, 243, 255, 0.05); border: 1px solid var(--secondary); color: var(--secondary);
        border-radius: 8px; font-size: 11px; font-weight: 700;
        text-decoration: none; text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
        transition: 0.3s;
    }
    .btn-buy:hover { 
        background: var(--secondary); color: #000; 
        box-shadow: 0 0 15px var(--secondary-glow);
    }

    /* =========================================
       DASHBOARD - ULTRA COMPACT (UNCHANGED)
       ========================================= */
    .container { max-width: 100%; margin: 0 auto; padding: 10px; display: none; animation: slideIn 0.5s ease-out; }
    
    header { 
        display: flex; justify-content: space-between; align-items: center; 
        background: var(--panel-bg); backdrop-filter: blur(10px);
        padding: 10px 12px; border-radius: 8px; border: 1px solid var(--glass-border); 
        margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    header h1 { 
        margin:0; font-family: 'Orbitron'; font-size: 13px; color: #fff; 
        display: flex; align-items: center; gap: 5px;
    }
    header h1 i { color: var(--secondary); font-size: 14px; }
    
    .credit-box { 
        background: rgba(188, 19, 254, 0.15); border: 1px solid var(--primary); 
        padding: 3px 8px; border-radius: 10px; font-weight: bold; 
        font-family: 'Rajdhani'; font-size: 11px; color: var(--text); 
        animation: heartbeat 2s infinite ease-in-out;
        display: flex; align-items: center; gap: 4px;
    }
    .credit-box i { color: #ffd700; font-size: 10px; }
    
    .logout-btn {
        background: rgba(255, 42, 109, 0.1); border: 1px solid var(--danger); color: var(--danger); 
        width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
        font-size: 10px; cursor: pointer; transition: 0.3s;
    }
    .logout-btn:hover { background: var(--danger); color: #fff; transform: rotate(90deg); }

    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 15px; }
    @media(min-width: 768px){ .grid { grid-template-columns: 240px 1fr; } }
    
    /* Panel Inputs & Buttons */
    .panel-input, .panel-select { 
        width: 100%; padding: 8px 10px; margin-bottom: 10px; height: 34px;
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); 
        color: #fff; border-radius: 6px; font-size: 11px; outline:none;
        transition: all 0.3s ease; font-family: 'Inter', sans-serif;
    }
    .panel-input:focus, .panel-select:focus { 
        border-color: var(--secondary); box-shadow: 0 0 5px rgba(0, 243, 255, 0.3); 
        background: rgba(0,0,0,0.8);
    }
    .btn-panel { 
        width: 100%; padding: 8px; height: 34px;
        background: linear-gradient(45deg, var(--primary), #6002ee, var(--secondary));
        background-size: 200% auto;
        border: none; color: #fff; font-weight: 700; letter-spacing: 0.5px;
        border-radius: 6px; cursor: pointer; font-size: 11px; 
        transition: 0.3s ease; text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
    }
    .btn-panel:hover { background-position: right center; transform: translateY(-1px); }

    .card { 
        background: var(--panel-bg); backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; 
    }
    .card h3 { 
        font-family: 'Orbitron'; margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.05); 
        padding-bottom:6px; margin-bottom: 10px; color:var(--text); font-size: 12px; display: flex; align-items: center; gap: 5px;
    }
    .card h3 i { color: var(--primary); font-size: 12px; }

    .info-tag {
        display: inline-flex; align-items: center; gap: 4px; font-size: 9px; color: var(--danger); 
        font-weight: 700; text-transform: uppercase; margin-bottom: 10px; 
        background: rgba(255, 42, 109, 0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255, 42, 109, 0.3);
    }

    .table-container { overflow-x: auto; border-radius: 5px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 2px; text-align:left; }
    th { padding: 6px 8px; color: #aaa; font-size: 9px; text-transform:uppercase; font-family: 'Orbitron'; letter-spacing: 0.5px; }
    td { padding: 6px 8px; font-size: 10px; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); }
    tr td:first-child { border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
    tr td:last-child { border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
    tbody tr:hover td { background: rgba(188, 19, 254, 0.15); }

    .badge { padding: 2px 5px; border-radius: 8px; font-size: 8px; font-weight:700; text-transform: uppercase; }
    .bg-green { background: rgba(5, 255, 161, 0.2); color: var(--success); border: 1px solid var(--success); }
    .bg-red { background: rgba(255, 42, 109, 0.2); color: var(--danger); border: 1px solid var(--danger); }
</style>
</head>
<body>

    <!-- RESELLER LOGIN - UPGRADED PREMIUM DARK UI -->
    <div id="loginOverlay">
        <div class="login-box">
            <div class="icon-wrapper">
                <i class="fas fa-user-secret"></i>
            </div>
            <h2>RESELLER PORTAL</h2>
            <input type="text" id="rUser" placeholder="Reseller ID">
            <input type="password" id="rPass" placeholder="Password">
            
            <button class="btn-login" onclick="loginReseller()">
                <i class="fas fa-sign-in-alt" style="margin-right: 4px;"></i> SECURE LOGIN
            </button>

            <!-- BUY NOW RESELLER OPTION -->
            <div class="promo-section">
                <p>Want to start your own business?</p>
                <!-- REPLACE "YourTelegramUsername" WITH YOUR ACTUAL TELEGRAM ID -->
                <a href="https://t.me/Bunnyownerr" target="_blank" class="btn-buy">
                    <i class="fab fa-telegram-plane"></i> BUY RESELLER PANEL
                </a>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="container" id="resellerPanel">
        <header>
            <h1><i class="fas fa-robot"></i> BUNNY BOT <span style="font-size:8px; color:var(--primary); background:rgba(188,19,254,0.2); padding: 2px 4px; border-radius:4px; margin-left:4px; vertical-align: middle;">RESELLER</span></h1>
            <div style="display:flex; gap:8px; align-items:center;">
                <div class="credit-box">
                    <i class="fas fa-coins"></i> Credits: <span id="myCredits" style="color:var(--secondary); margin-left:3px;">0</span>
                </div>
                <button class="logout-btn" onclick="location.reload()" title="Logout">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="grid">
            <!-- CREATE USER -->
            <div class="card">
                <h3><i class="fas fa-user-astronaut"></i> Generate User</h3>
                <div class="info-tag">
                    <i class="fas fa-bolt" style="color: #ffdc00;"></i> Cost: 1 Credit1 user
                </div>
                
                <input type="text" class="panel-input" id="newUid" placeholder="New Username" autocomplete="off">
                <input type="text" class="panel-input" id="newPass" placeholder="New Password" autocomplete="off">
                
                <select class="panel-select" id="newPlan">
                    <option value="">Loading Plans...</option>
                </select>

                <!-- VALIDITY -->
                <input type="number" class="panel-input" id="newValidity" placeholder="Validity (1-30 Days)" min="1" max="30">

                <button class="btn-panel" onclick="generateUser()">
                    <i class="fas fa-magic" style="margin-right: 4px;"></i> GENERATE
                </button>
            </div>

            <!-- MY USERS TABLE -->
            <div class="card">
                <h3><i class="fas fa-users-cog"></i> Generated By Me</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Password</th>
                                <th>Plan</th>
                                <th>Expiry</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="myUsersTable">
                            <!-- Loads Here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // 1. CONFIG (KEEP YOUR FIREBASE KEYS THE SAME AS ADMIN PANEL)
        const firebaseConfig = {
            apiKey: "AIzaSyAsGDwP2aacJ5OoAYqgDM8EMPB4jPxrfkk",
            authDomain: "bunny-7ab09.firebaseapp.com",
            databaseURL: "https://bunny-7ab09-default-rtdb.firebaseio.com",
            projectId: "bunny-7ab09"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let loggedInReseller = "";

        // --- LOGIN LOGIC ---
        function loginReseller() {
            const user = document.getElementById("rUser").value.trim();
            const pass = document.getElementById("rPass").value.trim();

            if(!user || !pass) return alert("Enter credentials!");

            db.ref("resellers/" + user).once("value").then(snapshot => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    if(data.password === pass) {
                        loggedInReseller = user;
                        document.getElementById("loginOverlay").style.display = "none";
                        document.getElementById("resellerPanel").style.display = "block";
                        
                        loadResellerData();
                        loadMyUsers();
                    } else {
                        alert("Invalid Password!");
                    }
                } else {
                    alert("Reseller ID not found!");
                }
            }).catch(err => alert("Error: " + err.message));
        }

        // --- LOAD DASHBOARD DATA & SET PERMISSIONS ---
        function loadResellerData() {
            db.ref("resellers/" + loggedInReseller).on("value", snapshot => {
                const data = snapshot.val();
                if(data) {
                    // 1. Update Credits
                    document.getElementById("myCredits").innerText = data.credits || 0;

                    // 2. Update Allowed Plans Dropdown
                    const planSelect = document.getElementById("newPlan");
                    planSelect.innerHTML = ""; // Clear old options

                    if (data.allowed_plans && Array.isArray(data.allowed_plans) && data.allowed_plans.length > 0) {
                        data.allowed_plans.forEach(planName => {
                            const opt = document.createElement("option");
                            opt.value = planName;
                            opt.innerText = planName;
                            planSelect.appendChild(opt);
                        });
                    } else {
                        // If admin didn't assign any plans
                        planSelect.innerHTML = '<option value="">❌ NO PLANS ASSIGNED</option>';
                    }
                }
            });
        }

        function loadMyUsers() {
            // Query Firebase to only show users created by THIS reseller
            db.ref("users").orderByChild("created_by").equalTo(loggedInReseller).on("value", snapshot => {
                const tbody = document.getElementById("myUsersTable");
                tbody.innerHTML = "";

                if(!snapshot.exists()) {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 10px; color:#888;'>No users yet.</td></tr>";
                    return;
                }

                snapshot.forEach(child => {
                    const u = child.val();
                    const uid = child.key;
                    
                    const now = Date.now();
                    let statusHtml = '<span class="badge bg-green">Active</span>';
                    if(u.banned) statusHtml = '<span class="badge bg-red">Banned</span>';
                    else if(u.expiry < now) statusHtml = '<span class="badge bg-red">Expired</span>';

                    const dateStr = new Date(u.expiry).toLocaleDateString();

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td style="font-weight:bold; color:var(--secondary);">${uid}</td>
                        <td style="font-family:monospace; color:#aaa; font-size:10px;">${u.password}</td>
                        <td style="font-weight:600;">${u.plan}</td>
                        <td><i class="far fa-calendar-alt" style="margin-right:2px; color:#888;"></i> ${dateStr}</td>
                        <td>${statusHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // --- GENERATE USER (CREDIT DEDUCTION LOGIC) ---
        function generateUser() {
            const uid = document.getElementById("newUid").value.trim();
            const pass = document.getElementById("newPass").value.trim();
            const plan = document.getElementById("newPlan").value;
            const days = parseInt(document.getElementById("newValidity").value);

            if(!uid || !pass) return alert("Please fill Username and Password!");
            if(!plan) return alert("❌ You do not have permission to sell any plans. Contact Admin.");
            
            // VALIDATION: Prevent more than 30 days or less than 1 day
            if(!days || days < 1 || days > 30) {
                return alert("❌ Invalid Input! You can only set validity between 1 and 30 Days.");
            }

            // Use a transaction to safely deduct 1 credit
            const resellerRef = db.ref("resellers/" + loggedInReseller);
            
            resellerRef.transaction((reseller) => {
                if (reseller) {
                    if (reseller.credits >= 1) {
                        reseller.credits -= 1; // Deduct 1 credit
                        reseller.total_created = (reseller.total_created || 0) + 1; // Increment tracker
                        return reseller; // Apply changes
                    } else {
                        return; // Abort transaction (Not enough credits)
                    }
                }
                return reseller;
            }, (error, committed, snapshot) => {
                if (error) {
                    alert("Transaction failed: " + error.message);
                } else if (!committed) {
                    alert("❌ INSUFFICIENT CREDITS! You need at least 1 credit to generate a user.");
                } else {
                    // Credit deducted successfully -> Create the user
                    const expiryTime = Date.now() + (days * 24 * 60 * 60 * 1000);
                    
                    db.ref("users/" + uid).set({
                        password: pass,
                        plan: plan,
                        expiry: expiryTime,
                        device_limit: 1, // Default to 1 device for reseller users
                        created_by: loggedInReseller,
                        created_at: Date.now()
                    }).then(() => {
                        alert("✅ USER GENERATED SUCCESSFULLY!\n1 Credit has been deducted.");
                        document.getElementById("newUid").value = "";
                        document.getElementById("newPass").value = "";
                        document.getElementById("newValidity").value = "";
                    });
                }
            });
        }
    </script>
</body>
</html>
